<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Holy Angels Substitution Management System</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- School Background Elements -->
    <div class="bg-decoration bg-decoration-1"></div>
    <div class="bg-decoration bg-decoration-2"></div>
    <div class="bg-decoration bg-decoration-3"></div>
    
    <div class="container">
        <div class="auth-container">
            <div class="auth-box">
                <div class="auth-header">
                    <div class="logo">
                        <span class="logo-icon">📚</span>
                        <h1>Holy Angels Substitution</h1>
                    </div>
                    <p class="subtitle">Smart Assignment for Better Education</p>
                </div>

                <div class="auth-tabs">
                    <button class="tab-btn active" onclick="switchTab('login')">Login</button>
                    <button class="tab-btn" onclick="switchTab('signup')">Sign Up</button>
                </div>

                <!-- Login Form -->
                <div id="loginForm" class="auth-form active">
                    <form onsubmit="handleLogin(event)">
                        <div class="form-group">
                            <label for="loginUsername">Username</label>
                            <input type="text" id="loginUsername" required placeholder="Enter your username">
                        </div>
                        <div class="form-group">
                            <label for="loginPassword">Password</label>
                            <input type="password" id="loginPassword" required placeholder="Enter your password">
                        </div>
                        <button type="submit" class="btn btn-primary btn-block">Login</button>
                    </form>
                </div>

                <!-- Signup Form -->
                <div id="signupForm" class="auth-form">
                    <form onsubmit="handleSignup(event)">
                        <div class="form-group">
                            <label for="signupUsername">Username</label>
                            <input type="text" id="signupUsername" required placeholder="Choose a username">
                        </div>
                        <div class="form-group">
                            <label for="signupEmail">Email</label>
                            <input type="email" id="signupEmail" required placeholder="Enter your email">
                        </div>
                        <div class="form-group">
                            <label for="signupPassword">Password</label>
                            <input type="password" id="signupPassword" required placeholder="Create a password" minlength="6">
                        </div>
                        <div class="form-group">
                            <label for="signupRole">Role</label>
                            <select id="signupRole" required>
                                <option value="">Select role</option>
                                <option value="incharge">Incharge</option>
                                <option value="staff">Staff</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-primary btn-block">Sign Up</button>
                    </form>
                </div>

                <div id="message" class="message"></div>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
</body>
</html>
