<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Substitutions - Holy Angels Substitution</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="dashboard">
        <nav class="navbar">
            <div class="navbar-brand">
                <span>📚</span>
                <span>Holy Angels Substitution</span>
            </div>
            <ul class="navbar-menu">
                <li><a href="dashboard.html">Dashboard</a></li>
                <li><a href="teachers.html">Teachers</a></li>
                <li><a href="timetables.html">Timetables</a></li>
                <li><a href="attendance.html">Attendance</a></li>
                <li><a href="substitutions.html" class="active">Substitutions</a></li>
                <li><a href="notifications.html">Notifications</a></li>
            </ul>
            <div class="user-info">
                <span class="user-role" id="userRole"></span>
                <span id="userName"></span>
                <button class="btn-logout" onclick="handleLogout()">Logout</button>
            </div>
        </nav>

        <div class="main-content">
            <div class="page-header">
                <h2>Substitution Records</h2>
                <p>View and manage substitution assignments</p>
            </div>

            <!-- Date Selector -->
            <div class="card mb-20">
                <div class="form-group">
                    <label for="substitutionDate">Select Date</label>
                    <input type="date" id="substitutionDate" onchange="loadSubstitutions()">
                    <button class="btn btn-secondary mt-20" onclick="viewAllSubstitutions()">View All</button>
                </div>
            </div>

            <!-- Substitutions Table -->
            <div class="card">
                <div class="card-header">
                    <h3 class="card-title" id="substitutionsTitle">Substitutions</h3>
                </div>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Date</th>
                                <th>Day</th>
                                <th>Period</th>
                                <th>Class</th>
                                <th>Subject</th>
                                <th>Absent Teacher</th>
                                <th>Substitute Teacher</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="substitutionsTable">
                            <tr>
                                <td colspan="9" class="text-center loading">Loading...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/substitutions.js"></script>
</body>
</html>
